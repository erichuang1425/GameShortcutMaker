name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The pure scan/classify/scoring logic runs cross-platform with no Qt or
      # win32com, so the suite needs only pytest.
      - run: pip install pytest
      - run: pytest tests/ -v
